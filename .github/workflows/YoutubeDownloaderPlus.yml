name: 🎯 YouTubeDownloader+

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🎬 Single YouTube URL (video or playlist)'
        required: false
        type: string

      urls:
        description: '📜 Multiple URLs (one per line)'
        required: false
        type: string

      type:
        description: '📦 Output Type'
        required: true
        type: choice
        options:
          - video
          - audio
        default: 'video'

      quality:
        description: '🎚️ Quality (video: p | audio: kbps)'
        required: false
        type: string
        default: '720p'

      split_threshold_mb:
        description: '✂️ Split files larger than (MB) — 0 = never'
        required: false
        type: number
        default: 90

      download_path:
        description: '📂 Folder to store downloaded content'
        required: false
        type: string
        default: 'downloads'

      workers:
        description: '⚡ Parallel downloads (recommended: 3–8)'
        required: false
        type: number
        default: 4

jobs:
  download-and-process:
    name: 🚀 Advanced YouTube Downloader
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📂 Clone Repository
        uses: actions/checkout@v4

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip curl jq parallel python3-pip
          pip install yt-dlp

      - name: 📜 Prepare URL List
        run: |
          mkdir -p /tmp/url_list

          if [ -n "${{ github.event.inputs.urls }}" ]; then
            echo "${{ github.event.inputs.urls }}" | sed '/^\s*$/d' > /tmp/url_list/raw.txt
          elif [ -n "${{ github.event.inputs.url }}" ]; then
            echo "${{ github.event.inputs.url }}" > /tmp/url_list/raw.txt
          else
            echo "❌ No URL provided"
            exit 1
          fi

          > /tmp/url_list/list.txt

          while read -r INPUT; do
            if yt-dlp --flat-playlist -J "$INPUT" >/tmp/pl.json 2>/dev/null; then
              COUNT=$(jq '.entries | length' /tmp/pl.json 2>/dev/null || echo 0)
              if [ "$COUNT" -gt 1 ]; then
                echo "📂 Playlist detected ($COUNT videos)"
                jq -r '.entries[].url' /tmp/pl.json \
                  | sed 's_^_https://www.youtube.com/watch?v=_' \
                  >> /tmp/url_list/list.txt
                continue
              fi
            fi
            echo "$INPUT" >> /tmp/url_list/list.txt
          done < /tmp/url_list/raw.txt

          echo "Final URLs:"
          cat /tmp/url_list/list.txt

      - name: 🧭 Create Base Directory
        run: |
          mkdir -p "${{ github.event.inputs.download_path }}"

      - name: ⚡ Download Videos in Parallel
        run: |
          BASE="${{ github.event.inputs.download_path }}"
          WORKERS=${{ github.event.inputs.workers }}
          QUALITY="${{ github.event.inputs.quality }}"
          TYPE="${{ github.event.inputs.type }}"
          SPLIT_MB="${{ github.event.inputs.split_threshold_mb }}"

          export BASE QUALITY TYPE SPLIT_MB

          parallel --jobs "$WORKERS" --line-buffer <<'EOF'
          #!/bin/bash
          YT_URL="$1"
          
          echo "━━━━━━━━━━━━━━━━━━━━━━"
          echo "▶ Processing: $YT_URL"
          echo "━━━━━━━━━━━━━━━━━━━━━━"
          
          META_JSON=$(yt-dlp -J "$YT_URL" 2>/dev/null)
          TITLE=$(echo "$META_JSON" | jq -r '.title // "video"')
          AUTHOR=$(echo "$META_JSON" | jq -r '.uploader // "Unknown"')
          ID=$(echo "$META_JSON" | jq -r '.id // "unknown"')
          
          SAFE_TITLE=$(echo "$TITLE" | sed "s/[^a-zA-Z0-9._-]/_/g")
          SAFE_AUTHOR=$(echo "$AUTHOR" | sed "s/[^a-zA-Z0-9._-]/_/g")
          
          mkdir -p "$BASE/$SAFE_AUTHOR"
          
          EXT="mp4"
          [ "$TYPE" = "audio" ] && EXT="mp3"
          
          OUTPUT_FILE="$BASE/$SAFE_AUTHOR/${SAFE_TITLE}_${ID}_${QUALITY}.$EXT"
          
          if [ -f "$OUTPUT_FILE" ]; then
            echo "✔ Skipping duplicate: $OUTPUT_FILE"
            exit 0
          fi
          
          echo "→ Converting…"
          
          API_PAYLOAD=$(printf '{"url":"%s","os":"linux","output":{"type":"%s","format":"%s","quality":"%s"},"audio":{"bitrate":"%s"}}' \
            "$YT_URL" "$TYPE" "$EXT" "$QUALITY" "$QUALITY")
          
          TASK_JSON=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d "$API_PAYLOAD" \
            https://hub.ytconvert.org/api/download)
          
          STATUS_URL=$(echo "$TASK_JSON" | jq -r '.statusUrl')
          
          if [ "$STATUS_URL" = "null" ]; then
            echo "❌ Conversion request failed"
            exit 1
          fi
          
          for i in {1..90}; do
            sleep 2
            STATUS=$(curl -s "$STATUS_URL")
            STATE=$(echo "$STATUS" | jq -r ".status")
          
            if [ "$STATE" = "completed" ]; then
              DL=$(echo "$STATUS" | jq -r ".downloadUrl")
              break
            fi
          done
          
          if [ -z "$DL" ] || [ "$DL" = "null" ]; then
            echo "❌ Timeout"
            exit 1
          fi
          
          echo "→ Downloading file…"
          curl -L --silent "$DL" -o "$OUTPUT_FILE"
          
          FILESIZE=$(stat -c%s "$OUTPUT_FILE")
          MB=$((FILESIZE / 1024 / 1024))
          
          if [ $SPLIT_MB -gt 0 ] && [ $MB -gt $SPLIT_MB ]; then
            cd "$BASE/$SAFE_AUTHOR"
            zip -r -s "${SPLIT_MB}m" "$(basename "$OUTPUT_FILE").zip" "$(basename "$OUTPUT_FILE")"
            rm "$(basename "$OUTPUT_FILE")"
            cd -
          fi
          
          echo "✔ Finished: $OUTPUT_FILE"
          EOF
        </tmp/url_list/list.txt

      - name: 📤 Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${{ github.event.inputs.download_path }}/"

          if git diff --staged --quiet; then
            echo "No new files"
            exit 0
          fi

          git commit -m "chore: add YouTube content [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"
`
