name: 🎯 YouTubeDownloader+

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🎬 Single YouTube URL (video or playlist)'
        required: false
        type: string

      urls:
        description: '📜 Multiple URLs (one per line)'
        required: false
        type: string

      type:
        description: '📦 Output Type'
        required: true
        type: choice
        options:
          - video
          - audio
        default: 'video'

      quality:
        description: '🎚️ Quality (video: 144p/360p/480p/720p/1080p | audio: 64kbps/128kbps/192kbps/320kbps)'
        required: false
        type: string
        default: '720p'

      split_threshold_mb:
        description: '✂️ Split files larger than (MB) — 0 = never'
        required: false
        type: number
        default: 90

      split_method:
        description: '🗜️ Split method (only if size > threshold)'
        required: false
        type: choice
        options:
          - zip
          - mp4
        default: 'zip'

      download_path:
        description: '📂 Folder to store downloaded content'
        required: false
        type: string
        default: 'downloads'

      workers:
        description: '⚡ Parallel downloads (recommended: 3–8)'
        required: false
        type: number
        default: 4

jobs:
  download-and-process:
    name: 🚀 Download & Process YouTube Content
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📂 Clone Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip curl jq parallel python3-pip ffmpeg
          pip install requests yt-dlp

      - name: 📜 Prepare URL List
        run: |
          mkdir -p /tmp/url_list

          if [ -n "${{ github.event.inputs.urls }}" ]; then
            echo "${{ github.event.inputs.urls }}" | sed '/^\s*$/d' > /tmp/url_list/raw.txt
          elif [ -n "${{ github.event.inputs.url }}" ]; then
            echo "${{ github.event.inputs.url }}" > /tmp/url_list/raw.txt
          else
            echo "❌ No URL provided"
            exit 1
          fi

          > /tmp/url_list/list.txt

          while read -r INPUT; do
            # Expand playlists
            if yt-dlp --flat-playlist -J "$INPUT" >/tmp/pl.json 2>/dev/null; then
              COUNT=$(jq '.entries | length' /tmp/pl.json 2>/dev/null || echo 0)
              if [ "$COUNT" -gt 1 ]; then
                echo "📂 Playlist detected ($COUNT videos)"
                jq -r '.entries[].url' /tmp/pl.json >> /tmp/url_list/list.txt
                continue
              fi
            fi
            echo "$INPUT" >> /tmp/url_list/list.txt
          done < /tmp/url_list/raw.txt

          echo "✅ Final URL list:"
          cat /tmp/url_list/list.txt

      - name: 🧭 Create Base Directory
        run: mkdir -p "${{ github.event.inputs.download_path }}"

      - name: 🐍 Write Conversion Helper Script
        run: |
          cat > /tmp/yt_convert.py << 'PYEOF'
          import sys, json, time, re, requests, os, shutil

          if len(sys.argv) != 6:
              print("Usage: yt_convert.py <url> <type> <quality> <output_file> <temp_dir>")
              sys.exit(1)

          YT_URL = sys.argv[1]
          OUTPUT_TYPE = sys.argv[2]
          QUALITY_INPUT = sys.argv[3]
          OUTPUT_FILE = sys.argv[4]
          TEMP_DIR = sys.argv[5]

          API_ENDPOINT = "https://hub.ytconvert.org/api/download"
          STATUS_CHECK_INTERVAL = 2
          MAX_ATTEMPTS = 90

          VIDEO_QUALITIES = ['144p', '360p', '480p', '720p', '1080p']
          AUDIO_BITRATES = ['64kbps', '128kbps', '192kbps', '320kbps']

          def normalize_quality(output_type, quality_input):
              if output_type == 'audio':
                  quality = quality_input.lower().strip().replace('p', '')
                  if 'kbps' not in quality:
                      quality = quality.replace('k', '') + 'kbps'
                  if quality in AUDIO_BITRATES:
                      return quality
                  bitrate_num = int(''.join(filter(str.isdigit, quality)))
                  supported_nums = [int(''.join(filter(str.isdigit, b))) for b in AUDIO_BITRATES]
                  closest = min(supported_nums, key=lambda x: abs(x - bitrate_num))
                  return [b for b in AUDIO_BITRATES if str(closest) in b][0]
              else:
                  quality = quality_input.lower().strip().replace('k', '')
                  if not quality.endswith('p'):
                      quality += 'p'
                  if quality in VIDEO_QUALITIES:
                      return quality
                  quality_map = {'240p': '360p', '4k': '1080p', '2160p': '1080p', '1440p': '1080p', '2k': '1080p'}
                  return quality_map.get(quality, '720p')

          QUALITY = normalize_quality(OUTPUT_TYPE, QUALITY_INPUT)
          print(f"🎯 {OUTPUT_TYPE.upper()} @ {QUALITY}")

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (X11; Linux x86_64; rv:140.0) Gecko/20100101 Firefox/140.0",
              "Accept": "application/json",
              "Referer": "https://media.ytmp3.gg/",
              "Content-Type": "application/json",
              "Origin": "https://media.ytmp3.gg",
          }

          if OUTPUT_TYPE == 'audio':
              payload = {"url": YT_URL, "os": "linux", "output": {"type": "audio", "format": "mp3"}, "audio": {"bitrate": QUALITY}}
          else:
              payload = {"url": YT_URL, "os": "linux", "output": {"type": "video", "format": "mp4", "quality": QUALITY}}

          session = requests.Session()
          session.get("https://media.ytmp3.gg/", headers=HEADERS)

          try:
              resp = session.post(API_ENDPOINT, json=payload, headers=HEADERS, timeout=30)
              if resp.status_code != 200:
                  if resp.status_code == 400:
                      if OUTPUT_TYPE == 'audio':
                          payload["audio"]["bitrate"] = "192kbps"
                      else:
                          payload["output"]["quality"] = "720p"
                      resp = session.post(API_ENDPOINT, json=payload, headers=HEADERS, timeout=30)
                  resp.raise_for_status()
              data = resp.json()
          except Exception as e:
              print(f"❌ API error: {e}")
              sys.exit(1)

          status_url = data.get('statusUrl')
          if not status_url:
              print("❌ No statusUrl")
              sys.exit(1)

          download_url = None
          for i in range(MAX_ATTEMPTS):
              time.sleep(STATUS_CHECK_INTERVAL)
              try:
                  sdata = session.get(status_url, headers=HEADERS, timeout=15).json()
              except:
                  continue
              if sdata.get('status') == 'completed':
                  download_url = sdata.get('downloadUrl')
                  break
              elif sdata.get('status') == 'failed':
                  print("❌ Conversion failed")
                  sys.exit(1)

          if not download_url:
              print("⏰ Timeout")
              sys.exit(1)

          # Download to temp file
          temp_file = os.path.join(TEMP_DIR, os.path.basename(OUTPUT_FILE))
          print(f"⬇️ Downloading to {temp_file}...")
          dl_headers = {
              "User-Agent": HEADERS["User-Agent"],
              "Referer": HEADERS["Referer"]
          }
          with session.get(download_url, headers=dl_headers, stream=True, timeout=300) as r:
              r.raise_for_status()
              with open(temp_file, 'wb') as f:
                  for chunk in r.iter_content(chunk_size=8192):
                      f.write(chunk)

          # Move to final location
          os.makedirs(os.path.dirname(OUTPUT_FILE), exist_ok=True)
          shutil.move(temp_file, OUTPUT_FILE)
          print("✅ Download completed")
          PYEOF

      - name: ⚡ Download & Process in Parallel
        run: |
          BASE="${{ github.event.inputs.download_path }}"
          WORKERS=${{ github.event.inputs.workers }}
          QUALITY="${{ github.event.inputs.quality }}"
          TYPE="${{ github.event.inputs.type }}"
          SPLIT_MB="${{ github.event.inputs.split_threshold_mb }}"
          SPLIT_METHOD="${{ github.event.inputs.split_method }}"
          TEMP_DIR=$(mktemp -d)

          export BASE QUALITY TYPE SPLIT_MB SPLIT_METHOD TEMP_DIR

          cat > /tmp/process_url.sh << 'SCRIPT'
          #!/bin/bash
          URL="$1"

          echo "━━━━━━━━━━━━━━━━━━━━━━"
          echo "▶ Processing: $URL"

          # Fast metadata lookup
          META_JSON=$(yt-dlp -J "$URL" 2>/dev/null)
          TITLE=$(echo "$META_JSON" | jq -r '.title // "video"')
          VID=$(echo "$META_JSON" | jq -r '.id // "unknown"')

          SAFE_TITLE=$(echo "$TITLE" | sed 's/[^a-zA-Z0-9._-]/_/g')

          EXT="mp4"
          [ "$TYPE" = "audio" ] && EXT="mp3"

          OUTPUT_FILE="$BASE/${SAFE_TITLE}_${VID}_${QUALITY}.$EXT"

          if [ -f "$OUTPUT_FILE" ]; then
            echo "✔ Already exists, skipping"
            exit 0
          fi

          echo "→ Converting..."
          python3 /tmp/yt_convert.py "$URL" "$TYPE" "$QUALITY" "$OUTPUT_FILE" "$TEMP_DIR"
          STATUS=$?

          if [ $STATUS -ne 0 ]; then
            echo "❌ Conversion failed"
            exit 1
          fi

          # Split if needed
          FILESIZE=$(stat -c%s "$OUTPUT_FILE")
          MB=$((FILESIZE / 1024 / 1024))
          if [ "$SPLIT_MB" -gt 0 ] && [ "$MB" -gt "$SPLIT_MB" ]; then
            echo "✂️ Splitting (${MB}MB > ${SPLIT_MB}MB)..."
            cd "$BASE"
            BASENAME=$(basename "$OUTPUT_FILE")
            NAME="${BASENAME%.*}"
            if [ "$SPLIT_METHOD" = "zip" ]; then
              zip -r -s "${SPLIT_MB}m" "${BASENAME}.zip" "$BASENAME"
              rm "$BASENAME"
            else
              # mp4 split using ffmpeg
              ffmpeg -i "$BASENAME" -c copy -f segment -segment_size "${SPLIT_MB}M" -reset_timestamps 1 "${NAME}_part%03d.${EXT}" < /dev/null
              rm "$BASENAME"
            fi
            cd -
          fi

          echo "✔ Done: $OUTPUT_FILE"
          SCRIPT

          chmod +x /tmp/process_url.sh
          parallel --jobs "$WORKERS" --line-buffer -a /tmp/url_list/list.txt bash /tmp/process_url.sh

      - name: 📤 Commit and Push to Repository
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${{ github.event.inputs.download_path }}/"

          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi

          mapfile -t STAGED_FILES < <(git diff --staged --name-only)
          TOTAL_FILES=${#STAGED_FILES[@]}

          echo "📦 Found $TOTAL_FILES file(s) to upload"

          git reset HEAD "${{ github.event.inputs.download_path }}/"

          BATCH_SIZE=5
          for (( i=0; i<TOTAL_FILES; i+=BATCH_SIZE )); do
            BATCH_NUM=$((i / BATCH_SIZE + 1))
            END=$((i + BATCH_SIZE))
            [[ $END -gt $TOTAL_FILES ]] && END=$TOTAL_FILES

            echo "🚀 Uploading batch $BATCH_NUM [$((i+1))–${END} of $TOTAL_FILES]"

            for (( j=i; j<END; j++ )); do
              git add "${STAGED_FILES[$j]}"
            done

            git commit -m "chore: add YouTube content batch $BATCH_NUM [skip ci]"
            git pull --rebase origin "$BRANCH" || true
            git push origin "HEAD:$BRANCH"

            echo "✅ Batch $BATCH_NUM uploaded"
          done

          echo "🎉 All files successfully uploaded to $BRANCH"
