name: 🎯 YouTubeDownloader+

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🎬 Single YouTube URL (video or playlist)'
        required: false
        type: string

      urls:
        description: '📜 Multiple URLs (separated by chosen delimiter)'
        required: false
        type: string

      url_separator:
        description: '🔹 Delimiter for multiple URLs'
        required: false
        type: choice
        options:
          - ', (comma)'
          - 'space'
          - '; (semicolon)'
          - '| (pipe)'
        default: ', (comma)'

      type:
        description: '📦 Output Type'
        required: true
        type: choice
        options:
          - video
          - audio
        default: 'video'

      quality:
        description: '🎚️ Quality (video: 144p/360p/480p/720p/1080p | audio: 64kbps/128kbps/192kbps/320kbps)'
        required: false
        type: string
        default: '720p'

      split_threshold_mb:
        description: '✂️ Split files larger than (MB) — 0 = never'
        required: false
        type: number
        default: 90

      split_method:
        description: '🗜️ Split method (only if size > threshold)'
        required: false
        type: choice
        options:
          - zip
          - mp4
        default: 'zip'

      download_path:
        description: '📂 Folder to store downloaded content'
        required: false
        type: string
        default: 'downloads'

      workers:
        description: '⚡ Parallel downloads (recommended: 3–8)'
        required: false
        type: number
        default: 4

jobs:
  download-and-process:
    name: 🚀 Download & Process YouTube Content
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📂 Clone Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip curl jq parallel python3-pip ffmpeg bc
          pip install requests yt-dlp

      - name: 📜 Prepare URL List
        run: |
          mkdir -p /tmp/url_list
          > /tmp/url_list/list.txt

          case "${{ github.event.inputs.url_separator }}" in
            ", (comma)")  SEP=",";;
            "space")      SEP=" ";;
            "; (semicolon)") SEP=";";;
            "| (pipe)")   SEP="|";;
            *)            SEP=",";;
          esac

          if [ -n "${{ github.event.inputs.urls }}" ]; then
            echo "${{ github.event.inputs.urls }}" | tr "$SEP" '\n' | sed 's/^[ \t]*//;s/[ \t]*$//' | sed '/^\s*$/d' > /tmp/url_list/raw.txt
          fi

          if [ -n "${{ github.event.inputs.url }}" ]; then
            echo "${{ github.event.inputs.url }}" >> /tmp/url_list/raw.txt
          fi

          if [ ! -s /tmp/url_list/raw.txt ]; then
            echo "❌ No URL provided"
            exit 1
          fi

          while read -r INPUT; do
            if yt-dlp --flat-playlist -J "$INPUT" >/tmp/pl.json 2>/dev/null; then
              COUNT=$(jq '.entries | length' /tmp/pl.json 2>/dev/null || echo 0)
              if [ "$COUNT" -gt 1 ]; then
                echo "📂 Playlist detected ($COUNT videos): $INPUT"
                jq -r '.entries[].url' /tmp/pl.json >> /tmp/url_list/list.txt
                continue
              fi
            fi
            echo "$INPUT" >> /tmp/url_list/list.txt
          done < /tmp/url_list/raw.txt

          echo "✅ Final URL list:"
          cat /tmp/url_list/list.txt

      - name: 🧭 Create Base Directory
        run: mkdir -p "${{ github.event.inputs.download_path }}"

      - name: 🐍 Write Conversion Helper Script
        run: |
          cat > /tmp/yt_convert.py << 'PYEOF'
          import sys, json, time, re, requests, os, shutil

          if len(sys.argv) != 6:
              print("Usage: yt_convert.py <url> <type> <quality> <base_dir> <temp_dir>", file=sys.stderr)
              sys.exit(1)

          YT_URL = sys.argv[1]
          OUTPUT_TYPE = sys.argv[2]
          QUALITY_INPUT = sys.argv[3]
          BASE_DIR = sys.argv[4]
          TEMP_DIR = sys.argv[5]

          API_ENDPOINT = "https://hub.ytconvert.org/api/download"
          STATUS_CHECK_INTERVAL = 2
          MAX_ATTEMPTS = 90
          RETRY_SERVER_ERRORS = [500, 502, 503, 504]
          MAX_API_RETRIES = 1

          VIDEO_QUALITIES = ['144p', '360p', '480p', '720p', '1080p']
          AUDIO_BITRATES = ['64kbps', '128kbps', '192kbps', '320kbps']

          def normalize_quality(output_type, quality_input):
              if output_type == 'audio':
                  quality = quality_input.lower().strip().replace('p', '')
                  if 'kbps' not in quality:
                      quality = quality.replace('k', '') + 'kbps'
                  if quality in AUDIO_BITRATES:
                      return quality
                  bitrate_num = int(''.join(filter(str.isdigit, quality)))
                  supported_nums = [int(''.join(filter(str.isdigit, b))) for b in AUDIO_BITRATES]
                  closest = min(supported_nums, key=lambda x: abs(x - bitrate_num))
                  return [b for b in AUDIO_BITRATES if str(closest) in b][0]
              else:
                  quality = quality_input.lower().strip().replace('k', '')
                  if not quality.endswith('p'):
                      quality += 'p'
                  if quality in VIDEO_QUALITIES:
                      return quality
                  quality_map = {'240p': '360p', '4k': '1080p', '2160p': '1080p', '1440p': '1080p', '2k': '1080p'}
                  return quality_map.get(quality, '720p')

          QUALITY = normalize_quality(OUTPUT_TYPE, QUALITY_INPUT)
          print(f"🎯 {OUTPUT_TYPE.upper()} @ {QUALITY}", file=sys.stderr)

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (X11; Linux x86_64; rv:140.0) Gecko/20100101 Firefox/140.0",
              "Accept": "application/json",
              "Referer": "https://media.ytmp3.gg/",
              "Content-Type": "application/json",
              "Origin": "https://media.ytmp3.gg",
          }

          if OUTPUT_TYPE == 'audio':
              payload = {"url": YT_URL, "os": "linux", "output": {"type": "audio", "format": "mp3"}, "audio": {"bitrate": QUALITY}}
          else:
              payload = {"url": YT_URL, "os": "linux", "output": {"type": "video", "format": "mp4", "quality": QUALITY}}

          session = requests.Session()
          session.get("https://media.ytmp3.gg/", headers=HEADERS)

          def api_post(payload, retries=MAX_API_RETRIES):
              for attempt in range(retries + 1):
                  try:
                      resp = session.post(API_ENDPOINT, json=payload, headers=HEADERS, timeout=30)
                      if resp.status_code in RETRY_SERVER_ERRORS and attempt < retries:
                          print(f"⚠️ Server error {resp.status_code}, retrying in 3s...", file=sys.stderr)
                          time.sleep(3)
                          continue
                      return resp
                  except requests.exceptions.RequestException as e:
                      if attempt < retries:
                          print(f"⚠️ Request error: {e}, retrying in 3s...", file=sys.stderr)
                          time.sleep(3)
                          continue
                      raise
              return resp

          try:
              resp = api_post(payload)
              if resp.status_code != 200:
                  if resp.status_code == 400:
                      if OUTPUT_TYPE == 'audio':
                          payload["audio"]["bitrate"] = "192kbps"
                      else:
                          payload["output"]["quality"] = "720p"
                      resp = api_post(payload)
                  if resp.status_code not in RETRY_SERVER_ERRORS:
                      resp.raise_for_status()
              data = resp.json()
          except Exception as e:
              print(f"❌ API error: {e}", file=sys.stderr)
              sys.exit(1)

          status_url = data.get('statusUrl')
          title = data.get('title', 'youtube_video')

          if not status_url:
              print("❌ No statusUrl", file=sys.stderr)
              sys.exit(1)

          download_url = None
          for i in range(MAX_ATTEMPTS):
              time.sleep(STATUS_CHECK_INTERVAL)
              try:
                  sdata = session.get(status_url, headers=HEADERS, timeout=15).json()
              except:
                  continue
              if sdata.get('status') == 'completed':
                  download_url = sdata.get('downloadUrl')
                  break
              elif sdata.get('status') == 'failed':
                  print("❌ Conversion failed", file=sys.stderr)
                  sys.exit(1)

          if not download_url:
              print("⏰ Timeout", file=sys.stderr)
              sys.exit(1)

          video_id_match = re.search(r'(?:v=|\/)([a-zA-Z0-9_-]{11})', YT_URL)
          video_id = video_id_match.group(1) if video_id_match else "unknown"

          safe_title = re.sub(r'[^a-zA-Z0-9\-_]', '_', title.replace(' ', '_'))
          safe_title = safe_title[:60] if len(safe_title) > 60 else safe_title
          safe_title = safe_title.strip('_') or video_id

          if OUTPUT_TYPE == 'audio':
              extension = "mp3"
              quality_label = QUALITY
          else:
              extension = "mp4"
              quality_label = QUALITY

          filename = f"{safe_title}_{video_id}_{quality_label}.{extension}"
          folder = safe_title
          final_path = os.path.join(BASE_DIR, folder, filename)

          temp_file = os.path.join(TEMP_DIR, filename)
          print(f"⬇️ Downloading to {temp_file}...", file=sys.stderr)
          dl_headers = {
              "User-Agent": HEADERS["User-Agent"],
              "Referer": HEADERS["Referer"]
          }
          with session.get(download_url, headers=dl_headers, stream=True, timeout=300) as r:
              r.raise_for_status()
              with open(temp_file, 'wb') as f:
                  for chunk in r.iter_content(chunk_size=8192):
                      f.write(chunk)

          os.makedirs(os.path.dirname(final_path), exist_ok=True)
          shutil.move(temp_file, final_path)
          print(f"✅ Download completed", file=sys.stderr)

          print(folder)
          print(filename)
          PYEOF

      - name: ⚡ Download & Process in Parallel
        run: |
          BASE="${{ github.event.inputs.download_path }}"
          WORKERS=${{ github.event.inputs.workers }}
          QUALITY="${{ github.event.inputs.quality }}"
          TYPE="${{ github.event.inputs.type }}"
          SPLIT_MB="${{ github.event.inputs.split_threshold_mb }}"
          SPLIT_METHOD="${{ github.event.inputs.split_method }}"
          TEMP_DIR=$(mktemp -d)

          echo "🔧 Split threshold: ${SPLIT_MB} MB"
          echo "🔧 Split method:    ${SPLIT_METHOD}"

          export BASE QUALITY TYPE TEMP_DIR

          cat > /tmp/process_url.sh << 'SCRIPT'
          #!/bin/bash
          URL="$1"
          SPLIT_MB="$2"
          SPLIT_METHOD="$3"

          echo "━━━━━━━━━━━━━━━━━━━━━━"
          echo "▶ Processing: $URL"
          echo "   Threshold: ${SPLIT_MB} MB | Method: ${SPLIT_METHOD}"

          # Python returns folder + filename
          { read -r FOLDER; read -r FILENAME; } < <(python3 /tmp/yt_convert.py "$URL" "$TYPE" "$QUALITY" "$BASE" "$TEMP_DIR")
          STATUS=$?

          if [ $STATUS -ne 0 ]; then
            echo "❌ Conversion failed for $URL"
            exit 1
          fi

          VIDEO_DIR="$BASE/$FOLDER"
          OUTPUT_FILE="$VIDEO_DIR/$FILENAME"
          NAME="${FILENAME%.*}"
          EXT="${FILENAME##*.}"

          # --- Smart duplicate / existing file handling ---
          DOWNLOADED_HERE=false   # flag to know if we just downloaded the file

          if [ -f "$OUTPUT_FILE" ]; then
            # Check if already split
            if ls "$VIDEO_DIR/${NAME}_part"* 2>/dev/null | head -n1 | grep -q .; then
              echo "✔ Already split, skipping"
              exit 0
            fi

            FILESIZE=$(stat -c%s "$OUTPUT_FILE")
            MB=$((FILESIZE / 1024 / 1024))

            if [ "$SPLIT_MB" -gt 0 ] && [ "$MB" -gt "$SPLIT_MB" ]; then
              echo "📁 Existing file (${MB}MB) needs splitting; proceeding..."
              # fall through to split section
            else
              echo "✔ Already exists (${MB}MB), no split needed, skipping"
              exit 0
            fi
          else
            # File doesn't exist – it was just downloaded by Python
            DOWNLOADED_HERE=true
            if [ ! -f "$OUTPUT_FILE" ]; then
              echo "❌ File missing after conversion: $OUTPUT_FILE"
              exit 1
            fi
          fi

          # --- Determine file size ---
          FILESIZE=$(stat -c%s "$OUTPUT_FILE")
          MB=$((FILESIZE / 1024 / 1024))

          # --- Split if needed ---
          if [ "$SPLIT_MB" -gt 0 ] && [ "$MB" -gt "$SPLIT_MB" ]; then
            echo "✂️ Splitting (${MB}MB > ${SPLIT_MB}MB) using method: ${SPLIT_METHOD}"
            cd "$VIDEO_DIR"
            BASENAME="$FILENAME"

            if [ "$SPLIT_METHOD" = "zip" ]; then
              if ! zip -r -s "${SPLIT_MB}m" "${BASENAME}.zip" "$BASENAME"; then
                echo "❌ zip split failed"
                exit 1
              fi
              rm "$BASENAME"
            else
              # --- mp4 split by duration ---
              DURATION=$(ffprobe -v error -show_entries format=duration \
                -of default=noprint_wrappers=1:nokey=1 "$BASENAME")
              BITRATE=$(ffprobe -v error -show_entries format=bit_rate \
                -of default=noprint_wrappers=1:nokey=1 "$BASENAME")

              if [ -n "$DURATION" ] && [ -n "$BITRATE" ] && [ "$BITRATE" != "N/A" ]; then
                TARGET_BYTES=$(echo "$SPLIT_MB * 1024 * 1024 * 0.9" | bc)
                SEG_TIME=$(echo "scale=2; $TARGET_BYTES * 8 / $BITRATE" | bc)
                SEG_TIME=$(echo "if ($SEG_TIME < 10) 10 else $SEG_TIME" | bc)
              else
                SEG_TIME=600
              fi

              echo "→ Splitting by time: ~${SEG_TIME}s per part"
              if ! ffmpeg -i "$BASENAME" -c copy -f segment -segment_time "$SEG_TIME" \
                -reset_timestamps 1 "${NAME}_part%03d.${EXT}" < /dev/null; then
                echo "❌ ffmpeg split failed"
                exit 1
              fi
              rm "$BASENAME"
            fi
            cd -
          else
            if [ "$DOWNLOADED_HERE" = true ]; then
              echo "📁 File size ${MB}MB – below threshold or splitting disabled"
            fi
          fi

          echo "✔ Done: $OUTPUT_FILE"
          SCRIPT

          chmod +x /tmp/process_url.sh

          # Pass split parameters as arguments to every job
          parallel --jobs "$WORKERS" --line-buffer \
            -a /tmp/url_list/list.txt \
            bash /tmp/process_url.sh {} "$SPLIT_MB" "$SPLIT_METHOD"

      - name: 📤 Commit and Push to Repository
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${{ github.event.inputs.download_path }}/"

          if git diff --staged --quiet; then
            echo "ℹ️ No changes to commit"
            exit 0
          fi

          mapfile -t STAGED_FILES < <(git diff --staged --name-only)
          TOTAL_FILES=${#STAGED_FILES[@]}

          echo "📦 Found $TOTAL_FILES file(s) to upload"

          git reset HEAD "${{ github.event.inputs.download_path }}/"

          BATCH_SIZE=5
          for (( i=0; i<TOTAL_FILES; i+=BATCH_SIZE )); do
            BATCH_NUM=$((i / BATCH_SIZE + 1))
            END=$((i + BATCH_SIZE))
            [[ $END -gt $TOTAL_FILES ]] && END=$TOTAL_FILES

            echo "🚀 Uploading batch $BATCH_NUM [$((i+1))–${END} of $TOTAL_FILES]"

            for (( j=i; j<END; j++ )); do
              git add "${STAGED_FILES[$j]}"
            done

            git commit -m "chore: add YouTube content batch $BATCH_NUM [skip ci]"
            git pull --rebase origin "$BRANCH" || true
            git push origin "HEAD:$BRANCH"

            echo "✅ Batch $BATCH_NUM uploaded"
          done

          echo "🎉 All files successfully uploaded to $BRANCH"
